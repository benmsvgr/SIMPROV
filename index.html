<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMPROV | Sistem Informasi Monitoring Persiapan PORPROV</title>

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="logo-siporbo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loader-card loader-premium-card">
      <div class="loader-logo-stage">
        <div class="loader-ring"></div>
        <div class="loader-ring loader-ring-2"></div>
        <div class="loader-logo-wrap">
          <img src="logo-siporbo.png" alt="Logo SIPORBO" />
        </div>
      </div>
      <b id="loadingText">Memproses...</b>
      <small>Mohon tunggu sebentar</small>
    </div>
  </div>

  <div id="loginPage" class="login-page">
    <div class="login-card fade-up">
      <div class="logo-box logo-img-wrap"><img src="logo-siporbo.png" alt="Logo SIPORBO"></div>
      <h1>SIMPROV</h1>
      <p>Sistem Informasi Monitoring Persiapan PORPROV</p>
      <small>Struktur anggaran, perencanaan, dan pencairan per bidang</small>

      <label>Username</label>
      <input id="username" type="text" placeholder="Masukkan username" autocomplete="username" />

      <label>Password</label>
      <input id="password" type="password" placeholder="Masukkan password" autocomplete="current-password" />

      <button id="loginBtn" onclick="login()">Login</button>
      <div id="loginMsg" class="msg"></div>
    </div>
  </div>

  <main id="appPage" class="app-page hidden">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-mini logo-img-wrap"><img src="logo-siporbo.png" alt="Logo SIPORBO"></div>
        <div>
          <h2>SIMPROV</h2>
          <p>Sistem Informasi Monitoring Persiapan PORPROV</p>
          <small id="userInfo">-</small>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn-refresh" onclick="refreshData()">Refresh</button>
        <button class="btn-danger" onclick="logout()">Logout</button>
      </div>
    </header>

    <nav id="menuNav" class="menu-nav"></nav>
    <section id="summaryCards" class="summary-grid"></section>
    <section id="contentArea" class="content-area"></section>
  </main>

  <div id="editModal" class="modal-backdrop hidden">
    <div class="modal-card fade-up">
      <div class="modal-head">
        <div>
          <h3 id="editModalTitle">Edit Perencanaan</h3>
          <p id="editModalSub">Perubahan akan diajukan kembali ke admin.</p>
        </div>
        <button class="btn-soft" onclick="closeEditModal()">Tutup</button>
      </div>
      <input type="hidden" id="editIdKegiatan" />
      <input type="hidden" id="editMode" />
      <div class="form-grid">
        <div class="field"><label>Nama Kegiatan</label><input id="editNamaKegiatan" /></div>
        <div class="field"><label>Rincian Kebutuhan</label><input id="editRincian" /></div>
        <div class="field"><label>Keterangan</label><input id="editKeterangan" /></div>
        <div class="field"><label>Volume</label><input id="editVolume" inputmode="numeric" oninput="onAngkaInput(this, 'editVolume', 'editHarga', 'editTotalPreview')" /></div>
        <div class="field"><label>Satuan</label><input id="editSatuan" /></div>
        <div class="field"><label>Harga Satuan</label><input id="editHarga" inputmode="numeric" oninput="onAngkaInput(this, 'editVolume', 'editHarga', 'editTotalPreview')" /></div>
        <div class="field"><label>Total Otomatis</label><input id="editTotalPreview" class="readonly-total" value="Rp0" readonly /></div>
        <div id="alasanPerubahanWrap" class="field full hidden"><label>Alasan Perubahan</label><textarea id="editAlasanPerubahan" rows="3" placeholder="Jelaskan alasan perubahan agar bisa dilihat admin"></textarea></div>
      </div>
      <button onclick="submitEditPerencanaan()">Simpan & Ajukan</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
